name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Checkout vbwd-fe-admin
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-admin
          path: vbwd-fe-admin
          submodules: recursive

      - name: Overlay plugin source
        run: cp -r plugin-src/. vbwd-fe-admin/plugins/email-admin/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vbwd-fe-admin/package-lock.json

      - name: Build vbwd-fe-core submodule
        run: |
          cd vbwd-fe-admin/vbwd-fe-core
          npm install
          npm run build

      - name: Install dependencies
        run: |
          cd vbwd-fe-admin
          npm install

      - name: Run plugin tests
        run: |
          cd vbwd-fe-admin
          if find plugins/email-admin -name "*.spec.ts" -o -name "*.test.ts" | grep -q .; then
            npx vitest run plugins/email-admin --reporter=verbose
          else
            echo "No tests found for email-admin — skipping."
          fi

  integration:
    name: Integration — email-admin (fe-admin)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Checkout vbwd-fe-admin
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-admin
          path: vbwd-fe-admin
          submodules: recursive

      - name: Overlay plugin source
        run: cp -r plugin-src/. vbwd-fe-admin/plugins/email-admin/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vbwd-fe-admin/package-lock.json

      - name: Build fe-core submodule
        working-directory: vbwd-fe-admin/vbwd-fe-core
        run: npm install && npm run build

      - name: Install dependencies
        working-directory: vbwd-fe-admin
        run: npm install

      - name: Install ALL plugins (vue-tsc needs full project)
        working-directory: vbwd-fe-admin/plugins
        run: |
          for entry in "analytics-widget:vbwd-fe-admin-plugin-analytics-widget" "cms-admin:vbwd-fe-admin-plugin-cms" "email-admin:vbwd-fe-admin-plugin-email" "ghrm-admin:vbwd-fe-admin-plugin-ghrm" "taro-admin:vbwd-fe-admin-plugin-taro" "booking:vbwd-fe-admin-plugin-booking"; do
            name="${entry%%:*}"; repo="${entry##*:}"
            [ -d "$name" ] && continue
            git clone --depth=1 -q "https://github.com/VBWD-platform/${repo}.git" "$name" 2>/dev/null || echo "Skipping $name"
          done

      - name: Run integration tests
        working-directory: vbwd-fe-admin
        run: ./bin/pre-commit-check.sh --plugin email-admin --integration
